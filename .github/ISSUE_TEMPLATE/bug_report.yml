name: Bug report
description: Report a reproducible problem with safe-env.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest schema and env input that demonstrates the problem.
      render: ts
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: safe-env version
      placeholder: 1.0.0
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: 22.11.0
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Links, logs, or other details that help explain the issue.
